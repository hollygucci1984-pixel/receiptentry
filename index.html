<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Receipt Entry Desk</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">OCR ENTRY DESK</p>
            <h1>レシート・請求書入力</h1>
          </div>
          <div class="top-actions">
            <button id="runOcrButton" class="primary" type="button" disabled>
              <span aria-hidden="true">◎</span>
              文字を読み取る
            </button>
            <button id="resetButton" class="ghost" type="button">クリア</button>
          </div>
        </header>

        <section class="panels">
          <article class="panel image-panel">
            <div id="dropZone" class="drop-zone">
              <input
                id="fileInput"
                type="file"
                accept="image/*,.heic,.heif"
                capture="environment"
              />
              <div class="drop-copy">
                <strong>画像を選択またはドロップ</strong>
                <span>レシート、請求書、納品書などに対応</span>
              </div>
            </div>
            <div class="image-stage">
              <img id="previewImage" alt="読み込み画像プレビュー" />
              <p id="emptyPreview">ここに画像が表示されます</p>
            </div>
            <div class="viewer-tools" aria-label="画像表示調整">
              <button class="icon-button" id="zoomOutButton" type="button" title="縮小">−</button>
              <input id="zoomRange" type="range" min="60" max="180" value="100" />
              <button class="icon-button" id="zoomInButton" type="button" title="拡大">＋</button>
              <button class="icon-button" id="rotateButton" type="button" title="回転">↻</button>
            </div>
          </article>

          <article class="panel data-panel">
            <div class="status-row">
              <div>
                <p class="label">読み取り状況</p>
                <strong id="statusText">画像を待っています</strong>
              </div>
              <progress id="ocrProgress" max="100" value="0"></progress>
            </div>

            <div class="tabs" role="tablist" aria-label="入力モード">
              <button class="tab active" data-tab="fields" type="button">項目入力</button>
              <button class="tab" data-tab="raw" type="button">読み取り文字</button>
              <button class="tab" data-tab="history" type="button">履歴</button>
            </div>

            <section id="fieldsTab" class="tab-panel active">
              <form id="entryForm" class="entry-form">
                <label>
                  書類種別
                  <select id="documentType">
                    <option>レシート</option>
                    <option>請求書</option>
                    <option>領収書</option>
                    <option>納品書</option>
                  </select>
                </label>
                <label>
                  取引先・店舗名
                  <input id="vendorName" autocomplete="organization" placeholder="例: ABC商店" />
                </label>
                <div class="field-grid">
                  <label>
                    日付
                    <input id="documentDate" type="date" />
                  </label>
                  <label>
                    合計金額
                    <input id="totalAmount" inputmode="numeric" placeholder="例: 12800" />
                  </label>
                </div>
                <div class="field-grid">
                  <label>
                    税額
                    <input id="taxAmount" inputmode="numeric" placeholder="例: 1164" />
                  </label>
                  <label>
                    登録番号・請求書番号
                    <input id="documentNumber" placeholder="例: T1234 / INV-001" />
                  </label>
